<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experts JSON editor</title>
  <style>
    :root {
      --bg: #f4f2ef;
      --surface: #fff;
      --border: #c9c4bd;
      --text: #1a1714;
      --muted: #5c5750;
      --accent: #2d5a4a;
      --danger: #8b2942;
      --banner: #fff3cd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .header h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 650;
      flex: 1 1 auto;
      min-width: 8rem;
    }
    .header button {
      font: inherit;
      cursor: pointer;
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    .header button:hover { background: var(--bg); }
    .header button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .header button.primary:hover { filter: brightness(1.06); }
    .banner {
      margin: 0;
      padding: 0.75rem 1rem;
      background: var(--banner);
      border-bottom: 1px solid #e6d9a8;
      color: #5c4810;
      font-size: 0.9rem;
    }
    .banner code { font-size: 0.88em; }
    main { max-width: 52rem; margin: 0 auto; padding: 1rem; }
    .toolbar-msg {
      min-height: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
      width: 100%;
      flex-basis: 100%;
    }
    .toolbar-msg.error { color: var(--danger); }
    .toolbar-msg.ok { color: var(--accent); }
    details.card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    details.card summary {
      cursor: pointer;
      padding: 0.65rem 1rem;
      font-weight: 600;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    details.card summary::-webkit-details-marker { display: none; }
    details.card summary::after {
      content: "▸";
      color: var(--muted);
      font-size: 0.85rem;
    }
    details.card[open] summary::after { content: "▾"; }
    .card-body { padding: 0 1rem 1rem; border-top: 1px solid var(--border); }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
      margin: 0.75rem 0 0.25rem;
    }
    .section-hint {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      margin: 1rem 0 0.15rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }
    .section-title:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0.25rem;
    }
    input[type="text"],
    textarea {
      width: 100%;
      font: inherit;
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #faf9f7;
    }
    textarea { min-height: 4.5rem; resize: vertical; }
    textarea.tall { min-height: 6rem; }
    .row-remove {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
    }
    .row-remove button {
      font: inherit;
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--danger);
      background: #fff;
      color: var(--danger);
    }
    .row-remove button:hover { background: #fdf2f4; }
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Experts JSON</h1>
    <button type="button" class="primary" id="btn-add">Add expert</button>
    <button type="button" id="btn-download">Download JSON</button>
    <button type="button" id="btn-copy">Copy JSON</button>
    <p class="toolbar-msg" id="toolbar-msg" aria-live="polite"></p>
  </header>
  <p class="banner" id="load-banner" hidden>
    Could not load <code>data/experts.json</code>. Serve this repo from its root (e.g.
    <code>python3 -m http.server 8080</code>) then open
    <code>http://localhost:8080/admin/</code>
  </p>
  <main id="app"></main>

  <script>
(function () {
  const SOCIAL_KEYS = [
    "instagram", "facebook", "twitter", "tiktok", "linkedin", "youtube",
    "threads", "pinterest", "bluesky", "mastodon", "github", "snapchat",
  ];

  const FIELDS = [
    "name", "role", "location", "bio", "quote", "image", "heroImage",
    "bookUrl", "linkedinUrl", "email", "openUrl",
  ];
  const ARRAY_FIELDS = ["focusTags", "details", "footerTags"];

  function emptySocial() {
    const o = {};
    SOCIAL_KEYS.forEach((k) => { o[k] = ""; });
    return o;
  }

  function emptyMedia() {
    return {
      spotifyUrl: "",
      youtube: { channelUrl: "", videoUrls: [], reelUrls: [] },
      gallery: [],
    };
  }

  function emptyExpert() {
    const o = {};
    FIELDS.forEach((k) => { o[k] = ""; });
    ARRAY_FIELDS.forEach((k) => { o[k] = []; });
    o.social = emptySocial();
    o.media = emptyMedia();
    return o;
  }

  function parseLines(text) {
    return String(text ?? "")
      .split(/\n/)
      .map((s) => s.trim())
      .filter(Boolean);
  }

  function linesFromArray(arr) {
    return (Array.isArray(arr) ? arr : []).join("\n");
  }

  function normalizeUrlList(v) {
    if (Array.isArray(v)) {
      return v.map((x) => String(x ?? "").trim()).filter(Boolean);
    }
    if (v != null && typeof v === "string") {
      return parseLines(v);
    }
    return [];
  }

  function normalizeGallery(raw) {
    if (!Array.isArray(raw)) return [];
    const out = [];
    for (const item of raw) {
      if (item == null) continue;
      if (typeof item === "string") {
        const u = item.trim();
        if (u) out.push({ url: u, alt: "" });
      } else if (typeof item === "object" && !Array.isArray(item)) {
        const url = String(item.url ?? "").trim();
        if (!url) continue;
        out.push({
          url,
          alt: item.alt != null ? String(item.alt) : "",
        });
      }
    }
    return out;
  }

  function normalizeMedia(raw) {
    const m = emptyMedia();
    if (!raw || typeof raw !== "object" || Array.isArray(raw)) return m;
    m.spotifyUrl = raw.spotifyUrl != null && typeof raw.spotifyUrl === "string"
      ? raw.spotifyUrl
      : String(raw.spotifyUrl ?? "");
    const yt = raw.youtube;
    if (yt && typeof yt === "object" && !Array.isArray(yt)) {
      m.youtube.channelUrl = yt.channelUrl != null && typeof yt.channelUrl === "string"
        ? yt.channelUrl
        : String(yt.channelUrl ?? "");
      m.youtube.videoUrls = normalizeUrlList(yt.videoUrls);
      m.youtube.reelUrls = normalizeUrlList(yt.reelUrls);
    }
    m.gallery = normalizeGallery(raw.gallery);
    return m;
  }

  function normalizeExpert(raw) {
    const o = emptyExpert();
    if (!raw || typeof raw !== "object" || Array.isArray(raw)) return o;
    FIELDS.forEach((k) => {
      o[k] = raw[k] != null && typeof raw[k] === "string" ? raw[k] : String(raw[k] ?? "");
    });
    ARRAY_FIELDS.forEach((k) => {
      const v = raw[k];
      if (Array.isArray(v)) {
        o[k] = v.map((x) => String(x ?? "").trim()).filter(Boolean);
      } else if (v != null && typeof v === "string") {
        o[k] = v.split(/\n/).map((s) => s.trim()).filter(Boolean);
      } else {
        o[k] = [];
      }
    });
    const soc = raw.social;
    if (soc && typeof soc === "object" && !Array.isArray(soc)) {
      SOCIAL_KEYS.forEach((k) => {
        const v = soc[k];
        o.social[k] = v != null && typeof v === "string" ? v : String(v ?? "");
      });
    }
    o.media = normalizeMedia(raw.media);
    return o;
  }

  function galleryLines(gallery) {
    return (Array.isArray(gallery) ? gallery : [])
      .map((g) => {
        const u = g.url || "";
        const a = (g.alt || "").trim();
        return a ? u + "|" + a : u;
      })
      .join("\n");
  }

  function parseGalleryLines(text) {
    return parseLines(text).map((line) => {
      const pipe = line.indexOf("|");
      if (pipe >= 0) {
        return {
          url: line.slice(0, pipe).trim(),
          alt: line.slice(pipe + 1).trim(),
        };
      }
      return { url: line.trim(), alt: "" };
    }).filter((g) => g.url);
  }

  function validateExperts(data) {
    if (!Array.isArray(data)) return "Expected a JSON array.";
    for (let i = 0; i < data.length; i++) {
      const x = data[i];
      if (x === null || typeof x !== "object" || Array.isArray(x)) {
        return "Each item must be a plain object.";
      }
    }
    return null;
  }

  function serializeExperts() {
    return experts.map((e) => {
      const mediaYoutube = e.media && e.media.youtube;
      return {
        name: e.name ?? "",
        role: e.role ?? "",
        location: e.location ?? "",
        bio: e.bio ?? "",
        image: e.image ?? "",
        bookUrl: e.bookUrl ?? "",
        linkedinUrl: e.linkedinUrl ?? "",
        email: e.email ?? "",
        openUrl: e.openUrl ?? "",
        quote: e.quote ?? "",
        heroImage: e.heroImage ?? "",
        social: (function () {
          const s = {};
          SOCIAL_KEYS.forEach((k) => {
            s[k] = (e.social && e.social[k] != null) ? String(e.social[k]) : "";
          });
          return s;
        })(),
        media: {
          spotifyUrl: e.media && e.media.spotifyUrl != null ? String(e.media.spotifyUrl) : "",
          youtube: {
            channelUrl: mediaYoutube && mediaYoutube.channelUrl != null
              ? String(mediaYoutube.channelUrl) : "",
            videoUrls: Array.isArray(mediaYoutube && mediaYoutube.videoUrls)
              ? [...mediaYoutube.videoUrls]
              : [],
            reelUrls: Array.isArray(mediaYoutube && mediaYoutube.reelUrls)
              ? [...mediaYoutube.reelUrls]
              : [],
          },
          gallery: Array.isArray(e.media && e.media.gallery)
            ? e.media.gallery
              .map((g) => ({
                url: String(g.url ?? ""),
                alt: g.alt != null ? String(g.alt) : "",
              }))
              .filter((g) => g.url)
            : [],
        },
        focusTags: Array.isArray(e.focusTags) ? [...e.focusTags] : [],
        details: Array.isArray(e.details) ? [...e.details] : [],
        footerTags: Array.isArray(e.footerTags) ? [...e.footerTags] : [],
      };
    });
  }

  function exportJsonString() {
    return JSON.stringify(serializeExperts(), null, 2) + "\n";
  }

  let experts = [];
  const app = document.getElementById("app");
  const toolbarMsg = document.getElementById("toolbar-msg");
  const loadBanner = document.getElementById("load-banner");

  function setToolbarMsg(text, kind) {
    toolbarMsg.textContent = text || "";
    toolbarMsg.className = "toolbar-msg" + (kind ? " " + kind : "");
  }

  function render() {
    app.textContent = "";
    if (experts.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-state";
      p.textContent = "No experts yet. Click “Add expert” to start.";
      app.appendChild(p);
      return;
    }
    experts.forEach((_, index) => {
      const e = experts[index];
      const card = document.createElement("details");
      card.className = "card";
      card.open = true;

      const summary = document.createElement("summary");
      const title = (e.name && e.name.trim()) || "(Untitled)";
      const sub = (e.role && e.role.trim()) ? " — " + e.role : "";
      summary.appendChild(document.createTextNode(title + sub));

      const body = document.createElement("div");
      body.className = "card-body";

      function syncSummary() {
        const cur = experts[index];
        const t = (cur.name && cur.name.trim()) || "(Untitled)";
        const s = (cur.role && cur.role.trim()) ? " — " + cur.role : "";
        summary.textContent = "";
        summary.appendChild(document.createTextNode(t + s));
      }

      function bindText(field, multiline) {
        const lab = document.createElement("label");
        lab.textContent = field;
        body.appendChild(lab);
        const el = multiline ? document.createElement("textarea") : document.createElement("input");
        if (!multiline) el.type = "text";
        el.value = e[field] ?? "";
        el.addEventListener("input", () => {
          experts[index][field] = el.value;
          syncSummary();
        });
        body.appendChild(el);
      }

      function bindArray(field) {
        const lab = document.createElement("label");
        lab.textContent = field + " (one per line)";
        body.appendChild(lab);
        const ta = document.createElement("textarea");
        ta.value = linesFromArray(e[field]);
        ta.addEventListener("input", () => {
          experts[index][field] = parseLines(ta.value);
          syncSummary();
        });
        body.appendChild(ta);
      }

      function sectionTitle(text) {
        const h = document.createElement("div");
        h.className = "section-title";
        h.textContent = text;
        body.appendChild(h);
      }

      bindText("name", false);
      bindText("role", false);
      bindArray("focusTags");
      bindText("location", false);
      bindArray("details");
      bindText("bio", true);

      sectionTitle("Quote & images");
      bindText("quote", true);
      bindArray("footerTags");
      bindText("image", false);
      const heroLab = document.createElement("label");
      heroLab.textContent = "heroImage";
      body.appendChild(heroLab);
      const heroHint = document.createElement("div");
      heroHint.className = "section-hint";
      heroHint.textContent = "Larger header image; profile card still uses image.";
      body.appendChild(heroHint);
      const heroIn = document.createElement("input");
      heroIn.type = "text";
      heroIn.value = e.heroImage ?? "";
      heroIn.addEventListener("input", () => {
        experts[index].heroImage = heroIn.value;
      });
      body.appendChild(heroIn);

      sectionTitle("Links");
      bindText("bookUrl", false);
      bindText("linkedinUrl", false);
      bindText("email", false);
      bindText("openUrl", false);

      sectionTitle("social — optional URLs");
      const socHint = document.createElement("div");
      socHint.className = "section-hint";
      socHint.textContent = "Leave blank when unused. Prefer social.linkedin when syncing with linkedinUrl.";
      body.appendChild(socHint);
      SOCIAL_KEYS.forEach((platform) => {
        if (!experts[index].social) experts[index].social = emptySocial();
        const lab = document.createElement("label");
        lab.textContent = "social." + platform;
        body.appendChild(lab);
        const inp = document.createElement("input");
        inp.type = "text";
        inp.value = experts[index].social[platform] ?? "";
        inp.addEventListener("input", () => {
          experts[index].social[platform] = inp.value;
        });
        body.appendChild(inp);
      });

      sectionTitle("media");
      if (!experts[index].media) experts[index].media = emptyMedia();
      const m = experts[index].media;
      if (!m.youtube || typeof m.youtube !== "object") {
        m.youtube = { channelUrl: "", videoUrls: [], reelUrls: [] };
      }

      let lab = document.createElement("label");
      lab.textContent = "media.spotifyUrl";
      body.appendChild(lab);
      const spotInp = document.createElement("input");
      spotInp.type = "text";
      spotInp.value = m.spotifyUrl ?? "";
      spotInp.addEventListener("input", () => {
        experts[index].media.spotifyUrl = spotInp.value;
      });
      body.appendChild(spotInp);

      lab = document.createElement("label");
      lab.textContent = "media.youtube.channelUrl";
      body.appendChild(lab);
      const chIn = document.createElement("input");
      chIn.type = "text";
      chIn.value = m.youtube.channelUrl ?? "";
      chIn.addEventListener("input", () => {
        experts[index].media.youtube.channelUrl = chIn.value;
      });
      body.appendChild(chIn);

      lab = document.createElement("label");
      lab.textContent = "media.youtube.videoUrls (one URL per line)";
      body.appendChild(lab);
      const vidTa = document.createElement("textarea");
      vidTa.value = linesFromArray(m.youtube.videoUrls);
      vidTa.addEventListener("input", () => {
        experts[index].media.youtube.videoUrls = parseLines(vidTa.value);
      });
      body.appendChild(vidTa);

      lab = document.createElement("label");
      lab.textContent = "media.youtube.reelUrls (one URL per line)";
      body.appendChild(lab);
      const reelTa = document.createElement("textarea");
      reelTa.value = linesFromArray(m.youtube.reelUrls);
      reelTa.addEventListener("input", () => {
        experts[index].media.youtube.reelUrls = parseLines(reelTa.value);
      });
      body.appendChild(reelTa);

      lab = document.createElement("label");
      lab.textContent = "media.gallery (one per line: url or url|alt)";
      body.appendChild(lab);
      const galTa = document.createElement("textarea");
      galTa.className = "tall";
      galTa.value = galleryLines(m.gallery);
      galTa.addEventListener("input", () => {
        experts[index].media.gallery = parseGalleryLines(galTa.value);
      });
      body.appendChild(galTa);

      const rowRm = document.createElement("div");
      rowRm.className = "row-remove";
      const rm = document.createElement("button");
      rm.type = "button";
      rm.textContent = "Remove expert";
      rm.addEventListener("click", () => {
        if (!confirm("Remove this expert?")) return;
        experts.splice(index, 1);
        render();
        setToolbarMsg("");
      });
      rowRm.appendChild(rm);
      body.appendChild(rowRm);

      card.appendChild(summary);
      card.appendChild(body);
      app.appendChild(card);
    });
  }

  document.getElementById("btn-add").addEventListener("click", () => {
    experts.push(emptyExpert());
    render();
    setToolbarMsg("");
  });

  document.getElementById("btn-download").addEventListener("click", () => {
    const blob = new Blob([exportJsonString()], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "experts.json";
    a.click();
    URL.revokeObjectURL(a.href);
    setToolbarMsg("Download started.", "ok");
  });

  document.getElementById("btn-copy").addEventListener("click", async () => {
    const text = exportJsonString();
    try {
      await navigator.clipboard.writeText(text);
      setToolbarMsg("Copied to clipboard.", "ok");
    } catch {
      setToolbarMsg("Could not copy (browser blocked clipboard). Use Download instead.", "error");
    }
  });

  fetch("../data/experts.json")
    .then((r) => {
      if (!r.ok) throw new Error(String(r.status));
      return r.json();
    })
    .then((data) => {
      const err = validateExperts(data);
      if (err) throw new Error(err);
      experts = data.map(normalizeExpert);
      loadBanner.hidden = true;
      render();
      setToolbarMsg("Loaded data/experts.json", "ok");
    })
    .catch(() => {
      loadBanner.hidden = false;
      experts = [];
      render();
      setToolbarMsg("Fix loading (see yellow banner) or add experts and export.", "error");
    });
})();
  </script>
</body>
</html>
